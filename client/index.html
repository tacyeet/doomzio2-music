
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Doomz.io 2 Music Engine</title>
<style>
body{font-family:sans-serif;background:#111;color:#eee;margin:0;padding:20px}
.panel{max-width:700px;margin:auto}
.controls button{margin-right:6px;padding:6px 12px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:10px}
input,select{width:100%}
.section{margin-top:12px}
</style>
</head>
<body>
<div class="panel">
<h2>Doomz.io 2 Music Engine</h2>

<div class="controls">
<button id="play">Play</button>
<button id="pause">Pause</button>
<button id="reset">Reset</button>
</div>

<div class="section">
<label>Biome</label>
<select id="biome">
<option>forest</option>
<option>plains</option>
<option>ocean</option>
<option>crystal_cave</option>
<option>deep_cavern</option>
<option>lava_tunnel</option>
<option>ash_wastes</option>
<option>magma_fields</option>
<option>void_depths</option>
</select>
</div>

<div class="section grid">

<label>Tempo</label><input id="tempo" type="range" min="40" max="140" value="70">
<label>Intensity</label><input id="intensity" type="range" min="0" max="1" step="0.01" value="0.3">
<label>Variation</label><input id="variation" type="range" min="0" max="1" step="0.01" value="0.5">
<label>Density</label><input id="density" type="range" min="0" max="1" step="0.01" value="0.5">
<label>Ambient</label><input id="ambient" type="range" min="0" max="1" step="0.01" value="0.4">
<label>Drums</label><input id="drums" type="range" min="0" max="1" step="0.01" value="0.3">
<label>Bass</label><input id="bass" type="range" min="0" max="1" step="0.01" value="0.4">
<label>Melody</label><input id="melody" type="range" min="0" max="1" step="0.01" value="0.6">
<label>Reverb</label><input id="reverb" type="range" min="0" max="1" step="0.01" value="0.5">
<label>Swing</label><input id="swing" type="range" min="0" max="1" step="0.01" value="0">
<label>Random</label><input id="random" type="range" min="0" max="1" step="0.01" value="0.5">

</div>

</div>
<script type="module" src="./main.js"></script>
</body>
</html>
